        - generic [ref=e23]:
          - paragraph [ref=e24]:
            - strong [ref=e25]:
              - generic [ref=e26]: Data Analyst – Inspire11
          - paragraph [ref=e27]: Elevens, as we call ourselves here, are curiously smart, purposefully scrappy, and dedicated to the highest standard of quality. By being true to ourselves and others, we create a respectful environment that enhances collaboration, drives growth through high expectations, and ensures alignment with our core values. Inspire11 is more than a modern business and technology consulting firm; we're a revolution. We work differently — and it shows. Every move we make is tied to measurable value, and our success aligns with our clients’ success. We partner to simplify the complex, solve sustainably, and stay ahead by continuously pushing our own thinking forward. Value creation isn't something we talk about — it's something we live, every day.
          - paragraph [ref=e28]: At Inspire11, we're not just offering a job; we're providing a platform for you to transform the future. You'll feel right at home here if you think differently, build boldly, and lead with impact. We're a place where your unique perspective is valued, your boldness is celebrated, and your potential is unleashed.
          - list [ref=e29]:
            - listitem [ref=e30]:
              - strong [ref=e31]:
                - generic [ref=e32]: "Growth Through Challenge:"
              - generic [ref=e34]: We hold ourselves to the highest standards of excellence and accountability. At Inspire11, we are committed to delivering exceptional results and empowering our employees to take ownership of their work and drive meaningful impact. You'll work alongside elite consultants who challenge you to expand your skills and think even more creatively.
          - list [ref=e35]:
            - listitem [ref=e36]:
              - strong [ref=e37]:
                - generic [ref=e38]: "The Autonomy to do Your Best Work:"
              - generic [ref=e39]: Here, outcomes matter more than outputs. It's about the value we create. You'll have the autonomy to shape your work, drive decisions, and make an impact—not just for our clients but for your growth. You'll be challenged to think strategically, anticipate needs, and solve problems. Bold thinking, creative approaches, and challenging conventional wisdom are part of our DNA. Our clients rely on us to lead them into what's next.
          - list [ref=e40]:
            - listitem [ref=e41]:
              - strong [ref=e42]:
                - generic [ref=e43]: "Diverse Perspectives Driving Innovative Solutions:"
              - generic [ref=e45]: We champion inclusivity and authenticity, knowing that diverse perspectives drive better solutions. You'll be encouraged to bring your whole self to work, knowing that's where true innovation happens. We also believe that doing great work should be fun. Our culture thrives on energy, camaraderie, and appreciating the unique contributions that make Inspire11 an amazing place. Our teams get energy from being the best they can be.
          - paragraph [ref=e46]:
            - strong [ref=e47]: "What you can expect in this role:"
            - text: "As a Data Analyst, you will serve as a bridge between data and decision-making. You’ll uncover insights, design data products, and help clients realize value through analytics. Your responsibilities will include:"
          - list [ref=e48]:
            - listitem [ref=e49]: Uncovering client needs through stakeholder interviews, process mapping, and exploratory data analysis.
            - listitem [ref=e50]: Assessing and interpreting raw data sets to evaluate trends, data quality, performance metrics, and the accuracy of business logic.
            - listitem [ref=e51]: Designing and building impactful dashboards and reports using tools like Power BI, Tableau, or Looker.
            - listitem [ref=e52]: Profiling and interpreting data to identify patterns and translate them into actionable, insight-driven recommendations.
            - listitem [ref=e53]: Leveraging cloud data platforms (e.g., Snowflake, Databricks, Redshift, Synapse) to access and analyze data at scale.
            - listitem [ref=e54]: Interfacing directly with clients throughout the project lifecycle—gathering requirements, sharing insights, and iterating on deliverables.
            - listitem [ref=e55]: Collaborating cross-functionally with data engineers, architects, and solution owners to deliver holistic solutions.
            - listitem [ref=e56]: Facilitating Agile ceremonies and co-creation workshops with clients to shape iterative, high-impact solutions.
            - listitem [ref=e57]: Exploring opportunities to apply AI and GenAI to automate insights, accelerate reporting, or enhance decision intelligence.
          - paragraph [ref=e58]:
            - strong [ref=e59]: "Tools for success:"
            - generic [ref=e60]: We’re
            - generic [ref=e61]: "looking for analysts who combine technical acumen with consulting savvy and a growth mindset. Ideal candidates bring:"
          - list [ref=e62]:
            - listitem [ref=e63]:
              - generic [ref=e64]: 2+ years of consulting experience with a focus on data analysis, BI, or analytics strategy.
            - listitem [ref=e65]: Strong SQL skills, with experience analyzing large datasets and building queries to uncover trends, metrics, and data relationships.
            - listitem [ref=e66]: Hands-on experience with data visualization tools such as Power BI, Tableau, or equivalent.
            - listitem [ref=e67]: Exposure to modern cloud data platforms, including Snowflake, Databricks, Redshift, or Synapse.
            - listitem [ref=e68]: Familiarity with AI and machine learning concepts—and a willingness to explore how GenAI (e.g., ChatGPT, Copilot) can support faster analysis and insight generation.
            - listitem [ref=e69]: Excellent communication and storytelling skills, including experience presenting findings to external stakeholders.
            - listitem [ref=e70]: Comfort in dynamic, cross-functional environments, with an agile mindset and a collaborative working style.
            - listitem [ref=e71]: This role requires the willingness and ability to be onsite at the Inspire11 or client location depending on project needs to maximize in-person collaboration and build stronger relationships.
          - paragraph [ref=e72]: Inspire11 is unable to sponsor employment visas at this time. Applicants must be legally authorized to work in the U.S. at the time of application and throughout the duration of employment.
          - paragraph [ref=e73]:
            - text: "Inspire11’s Privacy Policy:"
            - link "https://www.inspire11.com/privacy-policy/" [ref=e74] [cursor=pointer]:
              - /url: https://www.inspire11.com/privacy-policy/
              - generic [ref=e75]: https://www.inspire11.com/privacy-policy/
          - paragraph [ref=e76]:
            - strong [ref=e77]: U.S. Compensation & Benefits
          - paragraph [ref=e78]:
            - strong [ref=e79]: Compensation at Inspire11
            - text: Inspire11 follows Title VII of the Civil Rights Act of 1964, the Equal Pay Act of 1963, the Illinois Human Rights Act, the Illinois Equal Wage Act, and the Illinois Equal Pay Act of 2003. We believe that people performing the same role at the same level, with similar levels of ability or experience, should be similarly compensated. We also believe that the most critical factors driving compensation should be an Eleven’s skill, experience, performance, responsibility, and effort. We may also consider an employee’s length of service, relevant education, training, or certification, and the requirements of a specific job. We may also consider whether the cost of living or competition for talent in specific markets requires adjustments in compensation for employees in those markets. Our goal is to fairly compensate all our Elevens based on these factors within the Company’s financial ability.
          - paragraph [ref=e80]: Compensation may be increased or decreased at Inspire11’s discretion based on an employee’s performance reviews, market conditions, and the Company’s financial performance. Inspire11 will always notify an employee in writing before any change is made to their compensation.
          - paragraph [ref=e81]:
            - strong [ref=e82]: Bonuses
            - text: "We may allow employees in Sales, Recruiting, or Leadership to earn periodic bonuses based on sales, revenue, client-specific or practice-specific targets. These targets are communicated to each eligible employee via offer letter or annual update. All such target-based bonuses are calculated based on the Company and an individual’s periodic performance and will only be awarded if: (a) the employee is meeting performance expectations and is an employee in good standing of the Company; (b) the target is met; and (c) the Company’s current financial performance and market conditions permit the bonus to be paid out. All periodic bonuses are discretionary and are earned only when paid out."
          - paragraph [ref=e83]:
            - text: Each year, the Company will decide whether the Company’s financial performance, market performance, and business realities allow it to create an annual bonus pool. If the Company decides that annual bonuses may be awarded, then the Leadership Team will grant annual bonuses to employees in good standing based on the same factors discussed in the previous paragraph while also considering employees’ diligence, performance, expertise, skill, judgment, and experience. To be eligible to participate in this annual bonus pool, an employee must be hired by no later than October 1
            - generic [ref=e84]: st
            - text: of the preceding year. Annual bonuses and merit increases may be prorated based on hire date. Employees eligible for target-based periodic bonuses are not eligible to participate in the annual bonus pool.
          - paragraph [ref=e85]:
            - strong [ref=e86]: Options or Other Equity in Inspire11
            - text: Inspire11 has a legacy program that allowed certain high-performing employees to purchase shares of the Company through an affiliate. The Company also has a newer program that grants options annually to high-performing employees based on their performance reviews, their managers’ recommendation, and leadership approval. These options have a vesting period associated with them.
          - paragraph [ref=e87]:
            - strong [ref=e88]: Benefits
            - text: "Full-time employees are eligible for the following contributory benefits, where premiums are partially paid by the Company and partially by the employee:"
          - list [ref=e89]:
            - listitem [ref=e90]: Medical insurance plans,
            - listitem [ref=e91]: Dental insurance plans, and
            - listitem [ref=e92]: Vision insurance plans.
          - paragraph [ref=e93]: "Full-time employees are eligible for the following benefits provided wholly by the Company:"
          - list [ref=e94]:
            - listitem [ref=e95]: Short-term disability, providing for a benefit of 60% of an employee’s salary up to a maximum of $2,000 per week for up to 11 weeks after a 7-day waiting period;
            - listitem [ref=e96]: Long-term disability, providing for 60% of an employee’s salary up to a maximum of $10,000 per month for the time period from the 91st day after a qualifying event through the earlier of the end of the disability or age 67;
            - listitem [ref=e97]: Life insurance, providing for a benefit of two times the employee’s annual salary, up to a maximum payout of $400,000;
            - listitem [ref=e98]: A connectivity stipend of $325 annually;
            - listitem [ref=e99]: Employee Assistance Program, providing for confidential counseling sessions, 24-hour crisis support, online peer support groups, skills training, behavioral health coaching, initial free legal consultations (and discounted rates on referred lawyers), online legal forms, assistance with eldercare and parenting services, among other things.
          - paragraph [ref=e100]: Full-time employees are also eligible to participate in the Company’s 401(k) plan, which allows employees to contribute to a standard or Roth IRA. According to a vesting schedule, the Company matches 100% of employee contributions up to 3% of an employee’s salary.
          - paragraph [ref=e101]: "Depending on eligibility and their elections, full-time employees may also have access to certain tax-advantaged savings accounts set up through the Company, into which employees contribute withheld funds:"
          - list [ref=e102]:
            - listitem [ref=e103]: Flexible savings accounts
            - listitem [ref=e104]: Limited-purpose flexible savings accounts
            - listitem [ref=e105]: Healthcare savings accounts
            - listitem [ref=e106]: Dependent care savings accounts
            - listitem [ref=e107]: Commuter benefit accounts
          - paragraph [ref=e108]:
            - strong [ref=e109]: Paid Time Off and Leave
            - text: Inspire11 grants all eligible employees any statutory leave required by federal, Illinois, or other applicable law, such as FMLA, bereavement, sick leave, emergency leave, jury duty or witness leave, and VESSA leave.
          - paragraph [ref=e110]: In addition, Inspire11 has a self-managed paid time off policy (PTO) that does not set predetermined upper limits on the amount of PTO an employee may take. All PTO must be requested in advance and approved by the appropriate supervisor to ensure client work can continue. All full-time employees are expected to take a minimum of one week of PTO each year.
          - paragraph [ref=e111]: Inspire11 offers paid parental leave to full-time employees who have been with the company for at least one year. Birthing parents are eligible for up to 12 weeks of paid parental leave, while non-birthing parents are eligible for up to 6 weeks. Short-term disability (STD) benefits are also provided following childbirth. When combined with PTO and STD, birthing parents may receive a total of 18–20 weeks of paid leave. Lastly, Inspire11 has eight paid holidays.
          - paragraph [ref=e112]:
            - strong [ref=e113]: Other Benefits
            - text: "Inspire11 also maintains other programs that provide additional benefits to employees, such as:"
          - list [ref=e114]:
            - listitem [ref=e115]: "Impact to 11: a charitable giving matching program where, after being employed by Inspire11 for a year, employees may request that a qualifying charity receive up to $500 in matching donations each year."
            - listitem [ref=e116]: "Professional development benefits for qualifying employees: a program allowing for reimbursement of certain course materials and costs on a discretionary basis for employees who have been at Inspire11 for at least 6 months, with supervisor’s approval."
            - listitem [ref=e117]: Regular gifts of Inspire11 clothes, office items, and swag.
          - paragraph [ref=e118]:
            - strong [ref=e119]: Disclaimer
            - text: This document applies only to the United States and to Inspire11 LLC, not our worldwide partners.
          - paragraph [ref=e120]: Inspire11 reserves the right to change the benefits offered to employees in accordance with applicable law based on business needs, market conditions, and financial stability. Before changing any benefits, Company will notify all employees of the change and will update this document.
          - paragraph [ref=e121]:
            - strong [ref=e122]: EEOC
            - text: Inspire11 is an Equal Opportunity Workplace and an Affirmative Action Employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or protected veteran status. If you need assistance or a reasonable accommodation during the application process, please contact us at
            - link "hr@inspire11.com" [ref=e123] [cursor=pointer]:
              - /url: mailto:hr@inspire11.com
              - text: hr@inspire11
              - generic [ref=e124]: .com
            - text: ", or inform your recruiting partner."
