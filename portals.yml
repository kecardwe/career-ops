# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Analytics & BI roles --
    - "Data Analyst"
    - "Analytics"
    - "Business Intelligence"
    - "BI Analyst"
    - "Business Analyst"
    - "Reporting Analyst"
    - "Insights Analyst"
    - "Decision Scientist"
    # -- Supply chain & operations --
    - "Supply Chain Analyst"
    - "Supply Chain"
    - "Operations Analyst"
    - "Logistics Analyst"
    - "Demand Planning"
    - "Inventory Analyst"
    - "S&OP"
    - "Procurement Analyst"
    # -- Data engineering & science --
    - "Analytics Engineer"
    - "Data Engineer"
    - "Data Scientist"
    - "Quantitative Analyst"
    # -- Applied ML / automation (adjacent) --
    - "Machine Learning"
    - "ML Engineer"
    - "Automation"
  negative:
    - "Intern"
    - "VP "
    - "Director"
    - "Principal"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Lead"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Greenhouse --
  - name: Greenhouse — Data Analyst Chicago
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Data Analyst" Chicago'
    enabled: true

  - name: Greenhouse — Analytics Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Analytics Engineer" remote OR Chicago'
    enabled: true

  - name: Greenhouse — Supply Chain Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Supply Chain Analyst" OR "Supply Chain Analytics"'
    enabled: true

  - name: Greenhouse — Business Intelligence
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Business Intelligence Analyst" OR "BI Analyst" Chicago OR remote'
    enabled: true

  - name: Greenhouse — Operations Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Operations Analyst" OR "Logistics Analyst" Chicago OR remote'
    enabled: true

  # -- Lever --
  - name: Lever — Data Analyst Chicago
    query: 'site:jobs.lever.co "Data Analyst" Chicago OR remote'
    enabled: true

  - name: Lever — Analytics Engineer
    query: 'site:jobs.lever.co "Analytics Engineer" remote OR Chicago'
    enabled: true

  - name: Lever — Supply Chain Analyst
    query: 'site:jobs.lever.co "Supply Chain Analyst" OR "Operations Analyst"'
    enabled: true

  # -- Ashby --
  - name: Ashby — Data & Analytics
    query: 'site:jobs.ashbyhq.com "Data Analyst" OR "Analytics Engineer" OR "Business Intelligence"'
    enabled: true

  - name: Ashby — Supply Chain
    query: 'site:jobs.ashbyhq.com "Supply Chain" OR "Logistics Analyst" OR "Operations Analyst"'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Analytics & Supply Chain
    query: 'site:wellfound.com "Data Analyst" OR "Analytics Engineer" OR "Supply Chain Analyst" Chicago OR remote'
    enabled: true

  # -- Workable --
  - name: Workable — Analytics Roles
    query: 'site:apply.workable.com "Data Analyst" OR "Analytics Engineer" OR "Business Intelligence" Chicago OR remote'
    enabled: true

  # -- LinkedIn --
  # NOTE: LinkedIn job pages require login. The liveness checker will mark them as private ([!]).
  # They still land in pipeline.md for manual review when you're logged in.
  - name: LinkedIn — Data Analyst Chicago
    query: 'site:linkedin.com/jobs "Data Analyst" Chicago'
    enabled: true

  - name: LinkedIn — Analytics & Supply Chain
    query: 'site:linkedin.com/jobs "Analytics Engineer" OR "Supply Chain Analyst" OR "Business Intelligence Analyst" Chicago OR remote'
    enabled: true

  # -- Handshake --
  # NOTE: Handshake requires login. Results are useful for early-career and campus-recruiting roles.
  - name: Handshake — Data & Analytics
    query: 'site:joinhandshake.com "Data Analyst" OR "Analytics Engineer" OR "Supply Chain Analyst" OR "Business Intelligence"'
    enabled: true

